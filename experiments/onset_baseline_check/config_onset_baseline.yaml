seed: 20260620

paths:
  lsi_manifest: data_intermediate/stage2_lsi_labels/lsi_labels_manifest.csv
  time_split: data_intermediate/stage2_lsi_labels/time_split.json
  existing_label_thresholds: data_intermediate/stage2_lsi_labels/label_thresholds_train.json
  output_dir: experiments/onset_baseline_check/outputs

main_label:
  gap: 5
  lookback_clean: 10
  threshold_quantile: 0.90
  prefer_existing_thresholds_for_main: true

robustness_grid:
  enabled: true
  gaps: [5, 10]
  lookback_clean: [5, 10, 20]
  threshold_quantiles: [0.85, 0.90, 0.95]

sampling:
  max_stock_codes: 20
  train_max_per_class_per_code: 120
  trainval_max_per_class_per_code: 160
  eval_max_rows_per_task_horizon_period: 80000
  event_eval_full_test: false

models:
  logit:
    max_iter: 300
    class_weight: balanced
  lightgbm:
    n_estimators: 90
    learning_rate: 0.05
    num_leaves: 31
    min_child_samples: 200
    subsample: 0.85
    colsample_bytree: 0.85
  smartboost:
    max_iter: 60
    learning_rate: 0.045
    max_leaf_nodes: 15
    min_samples_leaf: 200
    l2_regularization: 0.15

bootstrap:
  iterations: 200
  confidence_level: 0.95
  max_rows: 250000

figures:
  dpi: 300
  save_pdf: true
